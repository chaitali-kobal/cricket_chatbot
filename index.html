<!DOCTYPE html>
<html>
<head>
  <title>Premium Cricket Chatbot 🏏</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 340px;
      height: 500px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .header {
      padding: 18px;
      text-align: center;
      background: linear-gradient(135deg, #ff512f, #dd2476);
      color: white;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .title {
      font-size: 22px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.9;
      margin-top: 4px;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 380px;
    }

    .message {
      max-width: 60%;
      padding: 8px;
      border-radius: 15px;
      font-size: 12px;
      animation: fadeIn 0.3s ease;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      border-bottom-right-radius: 5px;
    }

    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.2);
      color: white;
      border-bottom-left-radius: 5px;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: rgba(255,255,255,0.1);
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    input::placeholder {
      color: #ddd;
    }

    button {
      margin-left: 10px;
      border: none;
      padding: 12px 15px;
      border-radius: 10px;
      background: linear-gradient(135deg, #ff512f, #dd2476);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="title">🏏 Cricket</div>
    <div class="subtitle">Ask me anything about cricket</div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Ask anything about cricket..." onkeypress="if(event.key==='Enter') send()" />
    <button onclick="send()">🚀</button>
  </div>
</div>

<script>


  const knowledge = [

  // 🧑‍🤝‍🧑 Players
  { keywords: ["kohli","virat","king kohli"], answer: "🏏 Virat Kohli is one of the best batsmen in modern cricket." },
  { keywords: ["dhoni","msd","captain cool"], answer: "🏆 MS Dhoni is one of the greatest captains." },
  { keywords: ["rohit","hitman"], answer: "💥 Rohit Sharma is known as the Hitman." },
  { keywords: ["sachin","tendulkar","god of cricket"], answer: "👑 Sachin Tendulkar is the God of Cricket." },
  { keywords: ["babar","azam"], answer: "🏏 Babar Azam is one of the top batsmen from Pakistan." },
  { keywords: ["ben stokes"], answer: "🔥 Ben Stokes is one of the best all-rounders." },
  { keywords: ["joe root"], answer: "🏏 Joe Root is a top England batsman." },
  { keywords: ["steve smith"], answer: "🏏 Steve Smith is known for his unique batting style." },

  // 🏏 Teams
  { keywords: ["india team"], answer: "🇮🇳 India is one of the strongest cricket teams." },
  { keywords: ["australia team"], answer: "🇦🇺 Australia is the most successful team in World Cups." },
  { keywords: ["england team"], answer: "🏴 England invented cricket." },
  { keywords: ["pakistan team"], answer: "🇵🇰 Pakistan is known for its fast bowlers." },

  // 🏆 IPL Teams
  { keywords: ["csk","chennai"], answer: "🟡 Chennai Super Kings is one of the most successful IPL teams." },
  { keywords: ["mi","mumbai"], answer: "🔵 Mumbai Indians have won multiple IPL titles." },
  { keywords: ["rcb","bangalore"], answer: "🔴 RCB is popular but hasn't won IPL yet." },
  { keywords: ["kkr"], answer: "🟣 Kolkata Knight Riders have won IPL titles." },

  // 📋 Formats
  { keywords: ["test"], answer: "⏳ Test cricket is played over 5 days." },
  { keywords: ["odi"], answer: "📊 ODI has 50 overs per side." },
  { keywords: ["t20"], answer: "⚡ T20 is the shortest format with 20 overs." },
  { keywords: ["formats","types"], answer: "📋 Cricket has 3 formats: Test, ODI, T20." },

  // ⚖️ Rules
  { keywords: ["lbw"], answer: "⚖️ LBW means Leg Before Wicket." },
  { keywords: ["drs"], answer: "📺 DRS is used to review umpire decisions." },
  { keywords: ["no ball"], answer: "🚫 No ball is an illegal delivery." },
  { keywords: ["wide"], answer: "➡️ Wide ball is too far for batsman to hit." },
  { keywords: ["free hit"], answer: "🎯 Free hit allows batsman to hit without getting out (except run-out)." },

  // 🎯 Bowling
  { keywords: ["yorker"], answer: "🎯 Yorker is a ball aimed at batsman’s feet." },
  { keywords: ["bouncer"], answer: "⚡ Bouncer is a short ball aimed at head height." },
  { keywords: ["googly"], answer: "🌀 Googly is a deceptive spin ball." },
  { keywords: ["spin"], answer: "🌀 Spin bowling uses wrist/finger rotation." },
  { keywords: ["fast bowling"], answer: "⚡ Fast bowlers rely on speed and swing." },

  // 🏏 Batting
  { keywords: ["six"], answer: "💥 Six means ball crosses boundary without bouncing." },
  { keywords: ["four"], answer: "🏏 Four means ball touches boundary." },
  { keywords: ["century"], answer: "💯 Century means scoring 100 runs." },
  { keywords: ["half century"], answer: "🏏 50 runs is called half century." },

  // 🏟️ Matches & Events
  { keywords: ["world cup"], answer: "🌍 ICC World Cup is the biggest ODI tournament." },
  { keywords: ["t20 world cup"], answer: "🌍 T20 World Cup is played in shortest format." },
  { keywords: ["ashes"], answer: "🏆 The Ashes is between England and Australia." },
  { keywords: ["ipl"], answer: "🏏 IPL is the biggest T20 league." },

  // 📊 Records
  { keywords: ["highest score"], answer: "🏆 Brian Lara scored 400* in Tests." },
  { keywords: ["most runs"], answer: "🏏 Sachin Tendulkar has most international runs." },
  { keywords: ["most wickets"], answer: "🎯 Muttiah Muralitharan has most wickets." },

  // 🌧️ Special
  { keywords: ["duckworth","dl method"], answer: "🌧️ Used to calculate score in rain matches." },
  { keywords: ["powerplay"], answer: "⚡ Powerplay restricts fielders outside circle." },
  { keywords: ["fielding"], answer: "🤾 Fielding includes catching and stopping runs." }

];


function add(text, cls) {
  const div = document.createElement("div");
  div.className = "message " + cls;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = chat.scrollHeight;
}

function getReply(msg) {
  msg = msg.toLowerCase();

  for (let item of knowledge) {
    for (let key of item.keywords) {
      if (msg.includes(key)) return item.answer;
    }
  }

  if (msg.includes("best")) return "🏏 Players like Kohli, Babar, and Smith are top players.";

  return "🤖 I’m still learning! Ask about players, IPL, or rules.";
}

function send() {
  const input = document.getElementById("input");
  const msg = input.value;
  if (!msg) return;

  add(msg, "user");
  input.value = "";

  setTimeout(() => {
    add(getReply(msg), "bot");
  }, 400);
}

</script>

</body>
</html>
